name: ipv6diag

# ─── Networks ────────────────────────────────────────────────────────────────
# IPv6 is enabled on the internal network. Both server addresses are assigned
# statically so the Android emulator and test runner can use fixed IPs.
#
# NOTE: Docker's IPv6 support requires either:
#   a) Docker Desktop ≥ 4.29 (enable IPv6 in Settings → Docker Engine → "ipv6: true")
#   b) Linux: add {"ipv6": true, "fixed-cidr-v6": "fd00::/80"} to /etc/docker/daemon.json
#      then: sudo systemctl reload docker
#
# If IPv6 is not available on your Docker host, remove the ipv6 entries from
# the network config and server environment — IPv4 tests still work fully.

networks:
  diag:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
        - subnet: fd00:cafe::/80
          gateway: fd00:cafe::1

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Diagnostic server ───────────────────────────────────────────────────────
  # Listens on HTTP port 80 (IPv4 + IPv6). HTTPS is disabled in local mode
  # (no TLS cert). Bind to 0.0.0.0 and [::] inside the container; Docker
  # exposes :8080 on the host for curl testing from outside the compose stack.
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ipv6diag-server
    restart: unless-stopped
    command: >
      --http-addr=0.0.0.0:80
      --http6-addr=[::]:80
    ports:
      - "8080:80"          # IPv4 HTTP from host
      # - "51820:51820/udp"  # WireGuard — uncomment together with WG_ENABLED below
    networks:
      diag:
        ipv4_address: 172.28.0.10
        ipv6_address: fd00:cafe::10
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      - TZ=UTC
      # WireGuard service (opt-in). Uncomment and set WG_PUBLIC_ENDPOINT to your
      # server's public IP:port when running in a network-accessible deployment.
      # Also expose UDP port 51820 in the ports block below when enabling.
      # - WG_ENABLED=true
      # - WG_PORT=51820
      # - WG_SUBNET=10.0.0.0/24
      # - WG_MAX_SESSIONS=50
      # - WG_SESSION_TTL=2m
      # - WG_PUBLIC_ENDPOINT=<your-server-ip>:51820

  # ── Server test runner ───────────────────────────────────────────────────────
  # Runs curl-based tests against the server (IPv4 + IPv6 /diag and /health).
  # Exit 0 = all tests passed. Run: docker compose run --rm test-server
  test-server:
    image: alpine:3.21
    container_name: ipv6diag-test
    depends_on:
      server:
        condition: service_healthy
    networks:
      diag:
        ipv4_address: 172.28.0.20
        ipv6_address: fd00:cafe::20
    volumes:
      - ./docker/test-server.sh:/test.sh:ro
    entrypoint: ["sh", "/test.sh"]
    environment:
      - SERVER_IPV4=172.28.0.10
      - SERVER_IPV6=fd00:cafe::10
      - SERVER_PORT=80

  # ── Android emulator ─────────────────────────────────────────────────────────
  # Runs the Android 14 (API 34) emulator via noVNC. Open http://localhost:6080
  # in a browser to interact with the emulator UI.
  #
  # IMPORTANT LIMITATIONS IN THIS ENVIRONMENT:
  #   • TRANSPORT_CELLULAR is not available in the emulator — the app's
  #     CellularNetworkBinder will report "No cellular network available".
  #   • For real LTE / 464XLAT testing, sideload the APK onto a physical device.
  #   • The emulator IS useful for UI navigation and non-cellular code paths.
  #
  # To reach the diagnostic server from inside the emulator:
  #   • Use 10.0.2.2:8080  (Android emulator's gateway = container host = server)
  #   • Or use hostname "server" if Android's DNS resolves Docker names (it won't
  #     by default; use the IP instead).
  #
  # KVM acceleration: required for acceptable performance. The container uses
  # /dev/kvm. On Linux hosts, ensure the current user is in the "kvm" group:
  #   sudo usermod -aG kvm $USER && newgrp kvm
  # On Docker Desktop (Mac/Windows), KVM is handled automatically.
  android:
    image: budtmo/docker-android:emulator_14.0
    container_name: ipv6diag-android
    restart: unless-stopped
    privileged: true          # required for KVM and emulator syscalls
    devices:
      - /dev/kvm              # hardware acceleration — remove if unavailable
    ports:
      - "6080:6080"           # noVNC browser UI  →  http://localhost:6080
      - "5554:5554"           # ADB emulator console
      - "5555:5555"           # ADB device port  →  adb connect localhost:5555
    networks:
      - diag
    environment:
      - EMULATOR_DEVICE=Samsung Galaxy S10
      - WEB_VNC=true
      - APPIUM=false
      - MOBILE_DEVICE=false
    volumes:
      - android-avd:/root/.android/avd   # persist AVD between restarts
    shm_size: 2g                         # emulator needs generous shared memory
    healthcheck:
      test: ["CMD", "adb", "shell", "getprop", "sys.boot_completed"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s      # emulator cold-start takes 1–2 minutes

  # ── APK installer ────────────────────────────────────────────────────────────
  # Installs a pre-built APK into the running emulator.
  # Usage: docker compose run --rm apk-install
  # Pre-requisite: build the APK first with:
  #   cd android && ./gradlew assembleDebug
  #   The APK lands at android/app/build/outputs/apk/debug/app-debug.apk
  apk-install:
    image: budtmo/docker-android:emulator_14.0
    container_name: ipv6diag-apk-install
    depends_on:
      android:
        condition: service_healthy
    networks:
      - diag
    volumes:
      - ./android/app/build/outputs/apk/debug:/apk:ro
    entrypoint:
      - sh
      - -c
      - |
        adb connect ipv6diag-android:5555
        adb -s ipv6diag-android:5555 wait-for-device
        adb -s ipv6diag-android:5555 install -r /apk/app-debug.apk
        echo "APK installed. Open http://localhost:6080 to launch the app."
    profiles:
      - install            # only runs when: docker compose --profile install run apk-install

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  android-avd:
    name: ipv6diag-android-avd
  android-gradle-cache:
    name: ipv6diag-gradle-cache
